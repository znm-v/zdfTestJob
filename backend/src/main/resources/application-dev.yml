server:
  port: 8080

spring:
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sweetbite?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  # MVC配置（Swagger需要）
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    
  # Redis配置（可选）
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

# 日志配置
logging:
  level:
    com.sweetbite: debug
    com.sweetbite.mapper: debug

# 微信配置
wechat:
  appid: wx810fc74b29f76046
  secret: a70f4f3712fa520eb5131744a8e088cf

# Swagger配置
springfox:
  documentation:
    swagger-ui:
      enabled: true
